name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# The build is hermetic now (fonts vendored, no Google Fonts fetch), so CI needs
# no network beyond npm. Everything below is a gate the Dockerfile comments prove
# the value of — half of them are postmortems of things this would have caught.
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # CI exercises the same product-review posture as shared nonprod. The
      # smaller cutover preset is still covered by executable flag tests.
      APEX_FEATURE_PRESET: "full"
      APEX_UI_SKIN: "alpha-dark"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Matches the Dockerfile (node:22-alpine). A CI that builds on a
          # different major than production is testing a different program.
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Spec checks
        # The requirements from the 2026-07-21 sync, as executable rules: the
        # NCV credential priority, the feature-flag pilot shape, the five intake
        # must-knows, the three-way order routing, hCG sell-through, the
        # append-only history. These ran as a scratch harness for a while, which
        # meant they proved something once and guarded nothing. Node 22 strips
        # types natively and scripts/alias-hooks.mjs supplies the @/ alias, so
        # they run against the SAME source the app imports — no framework, no
        # compiled copy that can drift.
        run: npm run spec

      - name: Migration journal consistency
        run: npm run schema:check

      - name: Cutover static safety boundary
        run: npm run cutover:preflight

      - name: Lint
        # GATING. This was `|| true`, and it was hiding three genuine
        # react-hooks/rules-of-hooks violations — one on the client chart — each
        # of which crashes React ("Rendered fewer hooks than expected") the
        # moment its branch flips. Stylistic rules are demoted in .eslintrc.json
        # so this gate stays meaningful rather than being switched off again.
        run: npx next lint

      - name: Shipped assets are actually committed
        # public/ was covered by a blanket *.png ignore, so `git ls-files public`
        # returned nothing while the Dockerfile COPYed it. The image only had
        # logos because `az acr build` uploads the local working directory,
        # gitignored files included — a CI build or a fresh clone would have
        # shipped broken branding.
        run: |
          test -n "$(git ls-files public)" || { echo "public/ has no tracked files"; exit 1; }
          for f in $(git ls-files 'public/brand/*'); do test -s "$f" || { echo "empty asset: $f"; exit 1; }; done
          echo "ok  $(git ls-files public | wc -l) public assets tracked"

      - name: Build
        run: npm run build

      - name: Docker image builds
        # The host build proves Next compiles; this proves the production image
        # actually carries the traced server, static assets, public assets and
        # runtime migration files the deployed container depends on.
        run: |
          docker build -t apex-os-ci .
          docker build --target migration -t apex-os-migration-ci .

      - name: Audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Smoke (API contract)
        run: node scripts/smoke.mjs

      - name: Smoke (UI render)
        run: |
          npx playwright install --with-deps chromium
          node scripts/smoke-ui.mjs

      - name: Accessibility contrast gate self-test
        run: npm run contrast:self-test

      - name: Accessibility contrast gate (all routes)
        run: npm run contrast
