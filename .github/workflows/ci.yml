name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# The build is hermetic now (fonts vendored, no Google Fonts fetch), so CI needs
# no network beyond npm. Everything below is a gate the Dockerfile comments prove
# the value of — half of them are postmortems of things this would have caught.
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Matches the Dockerfile (node:22-alpine). A CI that builds on a
          # different major than production is testing a different program.
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        # GATING. This was `|| true`, and it was hiding three genuine
        # react-hooks/rules-of-hooks violations — one on the client chart — each
        # of which crashes React ("Rendered fewer hooks than expected") the
        # moment its branch flips. Stylistic rules are demoted in .eslintrc.json
        # so this gate stays meaningful rather than being switched off again.
        run: npx next lint

      - name: Shipped assets are actually committed
        # public/ was covered by a blanket *.png ignore, so `git ls-files public`
        # returned nothing while the Dockerfile COPYed it. The image only had
        # logos because `az acr build` uploads the local working directory,
        # gitignored files included — a CI build or a fresh clone would have
        # shipped broken branding.
        run: |
          test -n "$(git ls-files public)" || { echo "public/ has no tracked files"; exit 1; }
          for f in $(git ls-files 'public/brand/*'); do test -s "$f" || { echo "empty asset: $f"; exit 1; }; done
          echo "ok  $(git ls-files public | wc -l) public assets tracked"

      - name: Build
        run: npm run build

      - name: Audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Smoke (API contract)
        run: node scripts/smoke.mjs

      - name: Smoke (UI render)
        run: |
          npx playwright install --with-deps chromium
          node scripts/smoke-ui.mjs
